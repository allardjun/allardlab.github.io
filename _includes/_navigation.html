<nav class="site-nav" aria-label="Primary">
    <div class="site-nav__inner">
        <a class="site-nav__brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <button class="site-nav__menu-button" type="button" aria-expanded="false" aria-controls="primary-menu" aria-label="Menu">
            <span class="site-nav__menu-button-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>
        <ul id="primary-menu" class="site-nav__menu" role="list">
            {% for link in site.data.navigation %}
            {% assign is_active = false %}
            {% if link.url == page.url %}{% assign is_active = true %}{% endif %}
            {% if page.homepage and link.url == '/' %}{% assign is_active = true %}{% endif %}
            <li class="site-nav__item{% if link.side == 'right' %} site-nav__item--end{% endif %}">
                <a class="site-nav__link{% if is_active %} is-active{% endif %}"
                   href="{{ link.url | relative_url }}"
                   {% if is_active %}aria-current="page"{% endif %}>{{ link.title | escape }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</nav>
<script>
(function () {
    var btn = document.querySelector('.site-nav__menu-button');
    if (!btn) return;
    btn.addEventListener('click', function () {
        var expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    });
}());
</script>
