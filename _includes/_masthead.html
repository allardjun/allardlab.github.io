<header class="site-masthead" role="banner">
    <a class="site-masthead__link" href="{{ '/' | absolute_url }}" title="{{ site.title }}">
        <span class="masthead-title">{{ site.masthead.title }}</span>
        <span class="masthead-subtitle">{{ site.masthead.subtitle }}</span>
        <span class="masthead-description">{{ site.masthead.description }}</span>
    </a>
</header>
